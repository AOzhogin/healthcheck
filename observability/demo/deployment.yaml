# Example healthcheck service (built from example/metrics: 3 checks + process metrics on :8080,
# serving /health and /metrics). Apply into the `healthcheck` namespace for the demo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcheck-example
  labels:
    app: healthcheck-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcheck-example
  template:
    metadata:
      labels:
        app: healthcheck-example
    spec:
      containers:
        - name: app
          image: healthcheck-example:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: healthcheck-example
  labels:
    app: healthcheck-example
spec:
  selector:
    app: healthcheck-example
  ports:
    - name: http
      port: 8080
      targetPort: http
