# Example Alertmanager routing for the healthcheck alerts.
# Drop into your Alertmanager config, or feed it to the VM stack via VMAlertmanager
# (spec.configRawYaml) or a VMAlertmanagerConfig CRD. Receivers below are placeholders.
route:
  receiver: default
  group_by: ['alertname', 'check']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity = critical
      receiver: critical
    - matchers:
        - severity = warning
      receiver: warning

receivers:
  - name: default

  - name: critical
    # Replace with slack_configs / pagerduty_configs / opsgenie_configs as needed.
    webhook_configs:
      - url: 'http://alert-sink.example.invalid/critical'
        send_resolved: true

  - name: warning
    webhook_configs:
      - url: 'http://alert-sink.example.invalid/warning'
        send_resolved: true

inhibit_rules:
  # Silence the warning for a check once it is already critically down.
  - source_matchers: [severity = critical]
    target_matchers: [severity = warning]
    equal: ['check', 'instance']
